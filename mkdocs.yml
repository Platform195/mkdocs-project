site_name: Uplift Hub Docs
site_url: https://docs.uplifthub.io/
site_description: Getting started, guides and reference for Uplift Hub.
site_author: Platform 195

repo_url: https://github.com/platform195/uplift-hub-docs
repo_name: platform195/uplift-hub-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Geist
    code: Geist Mono
  logo: assets/uplift-hub-logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/regular/envelope
      link: mailto:support@uplifthub.io
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - tags

nav:
  - Home: index.md
  - Get started:
      - Introduction: get-started/introduction.md
      - Signing in: get-started/signing-in.md
      - Navigating Uplift Hub: get-started/navigating.md
  - Setup:
      - Add a new account: setup/add-account.md
      - Create a campaign: setup/create-campaign.md
      - Add line items: setup/add-line-items.md
  - Editing line items:
      - Assignees & rates: line-items/assignees-rates.md
      - Targeting & forecast: line-items/targeting.md
  - Creatives:
      - Add creatives: creatives/add.md
      - View all creatives: creatives/view.md
  - Going live:
      - Go-live workflow: going-live/workflow.md
  - More actions:
      - Tagging: more/tagging.md
      - Campaign extras: more/campaign-extras.md
      - Documents: more/documents.md
      - Line item extras: more/line-item-extras.md
  - Reporting:
      - Tracking performance: reporting/tracking.md
  - Reference:
      - Glossary: reference/glossary.md
      - Get help: reference/support.md
