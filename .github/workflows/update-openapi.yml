name: Update OpenAPI spec

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert Swagger 2.0 → OpenAPI 3.0
        run: npx --yes swagger2openapi https://app.uplifthub.io/P195_Exposed_Integrations/rest/V1/swagger.json -o openapi.json

      - name: Fix server URL, group tags and endpoint names
        run: node fix-openapi.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git diff --cached --quiet || git commit -m "chore: update OpenAPI spec"
          git pull --rebase origin main
          git push
